name: Deploy to Azure App Service

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set App Service runtime to Node 22 LTS
        run: az webapp config set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name rhythmsofindia-wus2 --linux-fx-version "NODE|22-lts"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rhythmsofindia-wus2
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
